<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gnsail.biz -- reimagined, again</title>

  <!-- 1. The library's stylesheet. Without this, every component renders unstyled. -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/performative-ui@0.6.0/dist/performative-ui.css" />

  <!-- 2. Import map: pins ONE React 19 instance. The library imports bare "react",
          and ?external=react,react-dom makes it resolve through this map to the
          same instance we render with. This is what prevents "invalid hook call". -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19",
      "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@19/jsx-dev-runtime",
      "react-dom": "https://esm.sh/react-dom@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "htm": "https://esm.sh/htm@3",
      "performative-ui": "https://esm.sh/performative-ui@0.6.0?external=react,react-dom"
    }
  }
  </script>

  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0a0a0f; color: #e8e8f0; }
    main { max-width: 760px; margin: 0 auto; padding: 18vh 24px 24px; text-align: center; }
    .stats { display: flex; gap: 40px; justify-content: center; margin: 48px 0; }
    .stats > div { font-size: 28px; font-weight: 700; }
    .stats small { display: block; font-size: 12px; font-weight: 400; opacity: 0.6; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- 3. The app. htm gives you JSX-like syntax with no compiler. -->
  <script type="module">
    import { createElement } from "react";
    import { createRoot } from "react-dom/client";
    import htm from "htm";
    import {
      Aurora, GradientText, PromptHero, StatCounter, WaitlistForm, Button
    } from "performative-ui";

    const html = htm.bind(createElement);   // now write <${Component}>…<//>

    function App() {
      return html`
        <main>
          <${GradientText} as="h1" style=${{ fontSize: "52px", lineHeight: 1.1 }}>
            bizness mail.<br>
    		 		for the snAIl era.
          <//>

          <p style=${{ opacity: 0.7, fontSize: "18px", margin: "20px 0 40px" }}>
            The least revenue-negative AI company in history. Now, with mail.
          </p>

          <div class="stats">
            <div><${StatCounter} target=${0000006} durationMs=${2000} /><small>routing rules</small></div>
            <div>$<${StatCounter} target=${002} durationMs=${2000} />M<small>destination mailboxes</small></div>
            <div><${StatCounter} target=${05.1} durationMs=${2000} />%<small>emails sent</small></div>
          </div>

          <${WaitlistForm} placeholder="you@gsnail.biz"
                           ctaLabel="Request early access"
                           footnote="We will email you exactly once, dramatically." />
        </main>
      `;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
