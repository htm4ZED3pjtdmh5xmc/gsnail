<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gnasil.biz -- mail, reimagined, again</title>
  <!-- 1. The library's stylesheet. Without this, every component renders unstyled. -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/performative-ui@0.6.0/dist/performative-ui.css" />
  <!-- 2. Import map: pins ONE React 19 instance. -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19",
      "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime",
      "react/jsx-dev-runtime": "https://esm.sh/react@19/jsx-dev-runtime",
      "react-dom": "https://esm.sh/react-dom@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "htm": "https://esm.sh/htm@3",
      "performative-ui": "https://esm.sh/performative-ui@0.6.0?external=react,react-dom"
    }
  }
  </script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0a0a0f; color: #e8e8f0; }
    main { max-width: 760px; margin: 0 auto; padding: 18vh 24px 24px; text-align: center; }
    .stats { display: flex; gap: 40px; justify-content: center; margin: 48px 0; }
    .stats > div { font-size: 28px; font-weight: 700; }
    .stats small { display: block; font-size: 12px; font-weight: 400; opacity: 0.6; margin-top: 4px; }
    /* Added: lets the "G" sit centered on top of the snail image. */
    .container { position: relative; display: inline-block; }
    .centered {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px; font-weight: 800;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- 3. The app. htm gives you JSX-like syntax with no compiler. -->
  <script type="module">
    import { createElement } from "react";
    import { createRoot } from "react-dom/client";
    import htm from "htm";
    import {
      Aurora, NodeGraphBackground, GradientText, StickyBanner, StatCounter, WaitlistForm
    } from "performative-ui";
    const html = htm.bind(createElement);   // now write <${Component}>…<//>
    function App() {
      return html`

        <${NodeGraphBackground} style=${{ position: "fixed", inset: 0, zIndex: -1 }} />
        
        <${StickyBanner}>
          <${GradientText}>gsnail Plothole 6 is currently unavailable.<//>
        <//>
        <main>
          
          <br /><br />
          
          <div class="container">
            <img src="Art.png" alt="Snail" style=${{ width: "25%" }} />
            <div class="centered">G</div>
          </div>

          <h1 style=${{ fontSize: "52px", lineHeight: 1.1 }}>
            bizness m<${GradientText}>ai<//>l. <br /> for the sn<${GradientText}>ai<//>l era.
          </h1>
          <p style=${{ opacity: 0.7, fontSize: "18px", margin: "20px 0 40px" }}>
            The least revenue-negative AI research team in history. Now powering your mail.
          </p>
          <div class="stats">
            <div>0000<${StatCounter} target=${6} durationMs=${4000} /><small>neural routes</small></div>
            <div><${StatCounter} target=${2} durationMs=${2000} />M<small>agent opportunities</small></div>
            <div><${StatCounter} target=${5} durationMs=${5000} />.<${StatCounter} target=${9} durationMs=${6000} /><small>monthly requests</small></div>
          </div>
          <${WaitlistForm} placeholder="you@gsnail.biz"
                           ctaLabel="Request early access"
                           footnote="We will never email you. Dramatically." />
        </main>
      `;
    }
    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
